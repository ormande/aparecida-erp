name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres só na VM do Actions: migrate/reset/seed/E2E não tocam no banco dos secrets.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aparecida_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aparecida_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/aparecida_ci
      # Fixo no CI para não depender de secret; só vale para o Postgres efêmero deste job.
      NEXTAUTH_SECRET: ci-e2e-nextauth-secret-32chars!!
      NEXTAUTH_URL: http://localhost:3000
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      DISABLE_RATE_LIMIT: "true"
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      ALLOW_DB_RESET: "true"
      ALLOW_DB_SEED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations no banco
        run: npx prisma migrate deploy

      - name: Checagem de tipos
        run: npx tsc --noEmit

