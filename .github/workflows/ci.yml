name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres só na VM do Actions: migrate/reset/seed/E2E não tocam no banco dos secrets.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aparecida_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aparecida_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/aparecida_ci
      # Fixo no CI para não depender de secret; só vale para o Postgres efêmero deste job.
      NEXTAUTH_SECRET: ci-e2e-nextauth-secret-32chars!!
      NEXTAUTH_URL: http://localhost:3000
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      DISABLE_RATE_LIMIT: "true"
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      ALLOW_DB_RESET: "true"
      ALLOW_DB_SEED: "true"
      TEST_OWNER_EMAIL: "teste@aparecida-test.local"
      TEST_OWNER_PASSWORD: "123456"
      TEST_COMPANY_NAME: "Aparecida Borracharia Teste"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations no banco
        run: npx prisma migrate deploy

      - name: Checagem de tipos
        run: npx tsc --noEmit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Instalar dependências do sistema para Playwright
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Reset e seed do banco de teste
        run: node scripts/reset-test-db.mjs && node scripts/seed-test-db.mjs

      - name: Rodar testes E2E
        run: npx playwright test

      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
